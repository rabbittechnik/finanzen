# https://docs.railway.com/guides/config-as-code
#
# Cron-Backups: nicht hier im Web-Service „Cron Schedule“ aktivieren.
# Stattdessen zweiten Service im Projekt + gleiches Volume; Startbefehl und Beispiel siehe README → „Railway: tägliches Backup per Cron“.
[build]
builder = "nixpacks"

[deploy]
startCommand = "uvicorn asgi:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips=* --lifespan on"
